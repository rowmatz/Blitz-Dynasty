{% extends "base.html" %}
{% block content %}

<div class="text-center mb-5">
    <h1 class="display-4 fw-bold">🏆 The Playoffs</h1>
    <h3 class="text-muted">{{ round }}</h3>
</div>

<div class="row justify-content-center mb-4">
    <div class="col-md-6 text-center">
        <a href="/sim_playoffs" class="btn btn-warning btn-lg fw-bold shadow w-100">
            Simulate {{ round }}
        </a>
    </div>
</div>

<div class="row">
    {% for game in bracket %}
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm text-center border-0">
            <div class="card-header bg-dark text-white">
                Matchup {{ loop.index }}
            </div>
            <div class="card-body d-flex justify-content-around align-items-center">
                
                <div>
                    <h2 class="fw-bold">{{ game.home }}</h2>
                    <span class="badge bg-secondary">Home</span>
                </div>
                
                <h3 class="text-muted">VS</h3>
                
                <div>
                    <h2 class="fw-bold">{{ game.away }}</h2>
                    <span class="badge bg-light text-dark border">Away</span>
                </div>
                
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
