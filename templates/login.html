{% extends 'base.html' %}
{% block title %}Log In — Blitz Dynasty{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="text-center mb-4">
      <h1 style="color:#e94560; font-size:2.5rem; font-weight:700;">⚡ BLITZ DYNASTY</h1>
      <p class="text-muted">Dynasty Fantasy Football</p>
    </div>

    <div class="card">
      <div class="card-header"><strong>Log In</strong></div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Log In</button>
        </form>
        <hr style="border-color:#2a2a4a;">
        <p class="text-center text-muted small mb-0">
          Have an invite code? <a href="{{ url_for('join') }}" style="color:#e94560;">Join the league</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
