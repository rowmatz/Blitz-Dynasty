{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4 text-center">🤝 Fantasy Trade Block</h2>
        
        {% if message %}
        <div class="alert alert-info">{{ message }}</div>
        {% endif %}

        <form method="POST" class="card p-4 shadow-sm">
            <div class="row g-4">
                <div class="col-md-6 border-end">
                    <h5 class="text-muted">Owner 1</h5>
                    <select name="owner1" class="form-select mb-3">
                        {% for o in owners %}
                        <option value="{{ o }}">{{ o }}</option>
                        {% endfor %}
                    </select>
                    <input type="text" name="player1" class="form-control" placeholder="Player to Give..." required>
                </div>

                <div class="col-md-6">
                    <h5 class="text-muted">Owner 2</h5>
                    <select name="owner2" class="form-select mb-3">
                        {% for o in owners %}
                        <option value="{{ o }}">{{ o }}</option>
                        {% endfor %}
                    </select>
                    <input type="text" name="player2" class="form-control" placeholder="Player to Receive..." required>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary w-100 fw-bold">PROPOSE TRADE</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
